<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたのSNSフォロワー1人あたりの収益ポテンシャル診断</title>
<meta name="description" content="5つの質問に答えるだけで、SNSフォロワー1人あたりの収益ポテンシャルと取りこぼし額が明らかになります。無料診断ツール。">
<meta property="og:title" content="SNSフォロワー収益ポテンシャル診断">
<meta property="og:description" content="5つの質問に答えるだけで、取りこぼし額とファネルのボトルネックが明らかになります">
<meta property="og:type" content="website">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&family=DM+Sans:wght@400;500;700;900&display=swap');
  :root {
    --bg:#07070c;--card:#0e0e16;--card-border:#1a1a2a;--card-hover:#14141f;
    --text:#e8e8f0;--text-dim:#6a6a80;--accent:#6366f1;--accent-glow:rgba(99,102,241,.25);
    --gold:#f59e0b;--green:#10b981;--red:#ef4444;--radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans JP','DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:40px 20px 60px;min-height:100vh}

  /* HEADER */
  .header{text-align:center;margin-bottom:36px}
  .header .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);padding:6px 16px;border-radius:100px;margin-bottom:20px}
  .header h1{font-size:clamp(22px,5vw,32px);font-weight:900;line-height:1.4;margin-bottom:12px;letter-spacing:-.02em}
  .header h1 em{font-style:normal;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header p{font-size:14px;color:var(--text-dim);line-height:1.7}

  /* PROGRESS */
  .progress-bar{display:flex;gap:5px;margin-bottom:24px}
  .progress-step{flex:1;height:4px;background:var(--card-border);border-radius:4px;transition:all .4s}
  .progress-step.active,.progress-step.done{background:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
  .step-labels{display:flex;justify-content:space-between;margin-bottom:28px;padding:0 2px}
  .step-label{font-size:9px;font-weight:600;color:var(--text-dim);transition:color .3s}
  .step-label.active{color:var(--accent)}.step-label.done{color:var(--green)}

  /* SCREENS */
  .screen{display:none;animation:fadeIn .4s ease}.screen.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .screen-title{font-size:18px;font-weight:700;margin-bottom:6px}
  .screen-subtitle{font-size:13px;color:var(--text-dim);margin-bottom:24px}

  /* OPTIONS */
  .options{display:flex;flex-direction:column;gap:10px}
  .option{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--card-border);border-radius:var(--radius);padding:15px 16px;cursor:pointer;transition:all .2s;user-select:none}
  .option:hover{background:var(--card-hover);border-color:rgba(99,102,241,.3);transform:translateY(-1px)}
  .option.selected{border-color:var(--accent);background:rgba(99,102,241,.06);box-shadow:0 0 24px var(--accent-glow)}
  .option-icon{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(255,255,255,.03);flex-shrink:0}
  .option-text{flex:1}.option-text .name{font-size:14px;font-weight:700;margin-bottom:1px}.option-text .desc{font-size:11px;color:var(--text-dim);line-height:1.4}
  .option-check{width:20px;height:20px;border:2px solid var(--card-border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .option.selected .option-check{border-color:var(--accent);background:var(--accent)}
  .option.selected .option-check::after{content:'\2713';color:#fff;font-size:11px;font-weight:900}
  .options.multi .option-check{border-radius:5px}

  /* INPUT GROUPS */
  .input-card{background:var(--card);border:1.5px solid var(--card-border);border-radius:var(--radius);padding:28px 24px;text-align:center}
  .input-card label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:16px}
  .input-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
  .input-row .yen{font-size:28px;font-weight:900;color:var(--text-dim)}
  .num-field{font-family:'DM Sans',sans-serif;font-size:36px;font-weight:900;background:transparent;border:none;border-bottom:3px solid var(--card-border);color:var(--text);text-align:center;width:180px;padding:8px 0;outline:none;transition:border-color .3s}
  .num-field:focus{border-color:var(--accent)}
  .num-field::placeholder{color:#333;font-size:22px}
  .input-row .unit-label{font-size:18px;font-weight:700;color:var(--text-dim)}
  .quick-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
  .quick-btn{font-family:inherit;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--card-border);color:var(--text-dim);cursor:pointer;transition:all .2s}
  .quick-btn:hover{border-color:var(--accent);color:var(--accent)}
  .quick-btn.active{border-color:var(--accent);background:rgba(99,102,241,.1);color:var(--accent)}
  .skip-note{font-size:11px;color:#444;margin-top:12px}

  /* BUTTONS */
  .btn-row{display:flex;gap:12px;margin-top:28px}
  .btn{flex:1;padding:16px 24px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
  .btn:disabled{opacity:.3;cursor:not-allowed}
  .btn-back{background:var(--card);color:var(--text-dim);border:1px solid var(--card-border);flex:0 0 auto;padding:16px 20px}
  .btn-back:hover:not(:disabled){background:var(--card-hover)}
  .btn-next{background:var(--accent);color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
  .btn-next:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 30px var(--accent-glow)}
  .btn-diagnose{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:16px;box-shadow:0 4px 24px var(--accent-glow)}
  .btn-diagnose:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 36px var(--accent-glow)}

  /* ====== RESULT STYLES ====== */
  .result-hero{text-align:center;padding:32px 24px;background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.05));border:1px solid rgba(99,102,241,.15);border-radius:20px;margin-bottom:20px;position:relative;overflow:hidden}
  .result-hero::before{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(99,102,241,.1),transparent 70%);pointer-events:none}
  .result-hero .your-label{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .result-hero .big-number{font-family:'DM Sans',sans-serif;font-size:clamp(34px,9vw,52px);font-weight:900;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:4px}
  .result-hero .unit{font-size:13px;color:var(--text-dim);margin-bottom:14px}
  .rank-badge{display:inline-block;font-size:12px;font-weight:800;padding:5px 16px;border-radius:100px}
  .rank-ss{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
  .rank-s{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
  .rank-a{background:linear-gradient(135deg,#059669,#047857);color:#fff}
  .rank-b{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
  .rank-c{background:linear-gradient(135deg,#64748b,#475569);color:#fff}

  /* LOSS */
  .loss-card{background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.03));border:1.5px solid rgba(239,68,68,.25);border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
  .loss-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 10px,rgba(239,68,68,.02) 10px,rgba(239,68,68,.02) 20px);pointer-events:none}
  .loss-label{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:6px;position:relative}
  .loss-sublabel{font-size:13px;color:#888;margin-bottom:14px;position:relative}
  .loss-amount{font-family:'DM Sans',sans-serif;font-size:clamp(36px,10vw,60px);font-weight:900;color:var(--red);line-height:1.1;position:relative;text-shadow:0 0 40px rgba(239,68,68,.3)}
  .loss-note{font-size:12px;color:#666;line-height:1.7;position:relative;margin-top:12px}
  .loss-note strong{color:#ccc}
  @keyframes pulseRed{0%,100%{box-shadow:0 0 20px rgba(239,68,68,.15)}50%{box-shadow:0 0 40px rgba(239,68,68,.3)}}
  .pulse-red{animation:pulseRed 2s infinite}

  /* TIMELINE */
  .timeline-loss{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.12);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
  .timeline-loss h3{font-size:14px;font-weight:700;color:var(--red);margin-bottom:14px}
  .timeline-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(239,68,68,.08)}
  .timeline-row:last-child{border-bottom:none}
  .timeline-row .tl-period{font-size:13px;color:#888;font-weight:600}
  .timeline-row .tl-amount{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;color:var(--red)}

  /* GAUGE */
  .gauge-section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .gauge-section h3,.model-section h3,.funnel-section h3,.per-follower-card h3{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:16px;letter-spacing:.05em}
  .gauge-track{width:100%;height:32px;background:rgba(255,255,255,.03);border-radius:10px;position:relative;overflow:visible;margin-bottom:18px}
  .gauge-current{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#64748b,#94a3b8);border-radius:10px;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:700;color:#fff;transition:width 1s cubic-bezier(.22,1,.36,1);z-index:2;min-width:36px}
  .gauge-potential{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,rgba(99,102,241,.3),rgba(139,92,246,.4));border:2px dashed rgba(139,92,246,.5);border-radius:10px;transition:width 1.2s cubic-bezier(.22,1,.36,1);z-index:1}
  .gauge-numbers{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .gauge-num{text-align:center;flex:1}
  .gauge-num .label{font-size:10px;color:var(--text-dim);margin-bottom:4px}
  .gauge-num .value{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:900}
  .gauge-num .value.current{color:#94a3b8}.gauge-num .value.potential{color:var(--accent)}.gauge-num .value.gap{color:var(--red)}
  .gauge-arrow{font-size:20px;color:var(--text-dim);align-self:center;padding-top:10px;flex:0}

  /* FUNNEL HEALTH */
  .funnel-section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .funnel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .funnel-metric{text-align:center;padding:16px 10px;border-radius:12px;background:rgba(255,255,255,.02)}
  .funnel-metric .fm-label{font-size:10px;color:var(--text-dim);margin-bottom:6px;line-height:1.4}
  .funnel-metric .fm-value{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:900;margin-bottom:4px}
  .funnel-metric .fm-bench{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block}
  .fm-good{color:var(--green)}.fm-good .fm-value{color:var(--green)}
  .fm-warn{color:var(--gold)}.fm-warn .fm-value{color:var(--gold)}
  .fm-bad{color:var(--red)}.fm-bad .fm-value{color:var(--red)}
  .fm-bench.good{background:rgba(16,185,129,.1);color:var(--green)}
  .fm-bench.warn{background:rgba(245,158,11,.1);color:var(--gold)}
  .fm-bench.bad{background:rgba(239,68,68,.1);color:var(--red)}

  .funnel-visual{display:flex;align-items:stretch;gap:0;margin:20px 0 10px;position:relative;height:100px}
  .funnel-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;text-align:center}
  .funnel-bar{width:100%;border-radius:6px 6px 0 0;transition:height .8s cubic-bezier(.22,1,.36,1);position:relative;min-height:8px}
  .funnel-bar-label{font-size:10px;font-weight:700;color:#fff;position:absolute;top:6px;left:0;right:0;text-align:center}
  .funnel-stage-label{font-size:10px;color:var(--text-dim);margin-top:6px;font-weight:600}
  .funnel-arrow{position:absolute;top:50%;font-size:14px;color:#444;z-index:2}
  .funnel-conversion-rate{font-size:9px;color:var(--gold);font-weight:700;position:absolute;top:-16px;left:0;right:0;text-align:center}

  /* PER FOLLOWER */
  .per-follower-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .pf-comparison{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center}
  .pf-box{text-align:center;padding:16px 10px;border-radius:14px}
  .pf-box.current-box{background:rgba(148,163,184,.06);border:1px solid rgba(148,163,184,.15)}
  .pf-box.potential-box{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2)}
  .pf-box .pf-label{font-size:11px;color:var(--text-dim);margin-bottom:8px}
  .pf-box .pf-value{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:900}
  .pf-box.current-box .pf-value{color:#94a3b8}.pf-box.potential-box .pf-value{color:var(--accent)}
  .pf-arrow{font-size:24px;color:var(--text-dim);text-align:center}
  .pf-multiplier{text-align:center;margin-top:10px;font-size:14px;font-weight:700;color:var(--gold)}

  /* MODEL BARS */
  .model-section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .model-bars{display:flex;flex-direction:column;gap:10px}
  .model-bar{display:flex;align-items:center;gap:8px}
  .model-bar .model-name{font-size:10px;font-weight:600;min-width:100px;color:var(--text-dim);text-align:right}
  .model-bar .bar-track{flex:1;height:26px;background:rgba(255,255,255,.03);border-radius:7px;overflow:hidden}
  .model-bar .bar-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;transition:width .8s cubic-bezier(.22,1,.36,1);white-space:nowrap}
  .bar-fill.tier-ss{background:linear-gradient(90deg,#7c3aed,#8b5cf6)}
  .bar-fill.tier-s{background:linear-gradient(90deg,#2563eb,#3b82f6)}
  .bar-fill.tier-a{background:linear-gradient(90deg,#059669,#10b981)}
  .bar-fill.tier-b{background:linear-gradient(90deg,#d97706,#f59e0b)}
  .bar-fill.tier-c{background:linear-gradient(90deg,#64748b,#94a3b8)}
  .model-bar .bar-status{font-size:10px;font-weight:700;min-width:60px;text-align:right}
  .model-bar.recommended{position:relative}
  .model-bar.recommended::after{content:'\1F451 \u63A8\u5968';font-size:9px;font-weight:700;color:var(--gold);position:absolute;right:0;top:-14px}

  /* INSIGHTS */
  .insight-box{background:rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.12);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .insight-box h3{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .insight-box p{font-size:13px;color:#aaa;line-height:1.9}
  .insight-box strong{color:var(--text)}.insight-box .hl{color:var(--accent);font-weight:700}

  /* BOTTLENECK */
  .bottleneck-card{background:rgba(245,158,11,.05);border:1.5px solid rgba(245,158,11,.2);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .bottleneck-card h3{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px}
  .bottleneck-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(245,158,11,.08)}
  .bottleneck-item:last-child{border-bottom:none}
  .bottleneck-item .bn-icon{font-size:18px;flex-shrink:0;margin-top:2px}
  .bottleneck-item .bn-text{font-size:12px;color:#999;line-height:1.7}
  .bottleneck-item .bn-text strong{color:#ccc}

  /* CTA */
  .cta-box{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.06));border:2px solid rgba(99,102,241,.25);border-radius:20px;padding:36px 24px;text-align:center;margin-top:24px;position:relative;overflow:hidden}
  .cta-box::before{content:'';position:absolute;top:-60%;left:-30%;width:160%;height:160%;background:radial-gradient(ellipse,rgba(99,102,241,.08),transparent 60%);pointer-events:none}
  .cta-box h3{font-size:18px;font-weight:900;margin-bottom:12px;position:relative;background:linear-gradient(135deg,#818cf8,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .cta-box p{font-size:13px;color:#999;line-height:1.8;margin-bottom:20px;position:relative}
  .cta-box p strong{color:#ccc}
  .cta-btn{display:inline-block;padding:16px 40px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-family:inherit;font-size:16px;font-weight:800;border:none;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none;position:relative;box-shadow:0 4px 24px var(--accent-glow)}
  .cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(99,102,241,.4)}
  .cta-sub{font-size:11px;color:#555;margin-top:12px;position:relative}
  .restart-btn{display:block;margin:24px auto 0;background:none;border:1px solid var(--card-border);color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:600;padding:12px 24px;border-radius:10px;cursor:pointer;transition:all .2s}
  .restart-btn:hover{border-color:var(--text-dim);color:var(--text)}
  .animate-in{animation:countUp .6s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">&#x1F4CA; &#x7121;&#x6599;&#x8A3A;&#x65AD;&#x30C4;&#x30FC;&#x30EB;</div>
    <h1>あなたのSNSフォロワー<br><em>1人あたりの収益ポテンシャル</em><br>は、いくら？</h1>
    <p>5つの質問に答えるだけで、取りこぼし額と<br>ファネルのボトルネックが明らかになります</p>
  </div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="step-labels" id="stepLabels"></div>

  <!-- STEP 1: ジャンル -->
  <div class="screen active" id="screen1">
    <div class="screen-title">あなたの発信ジャンルは？</div>
    <div class="screen-subtitle">最も近いものを1つ選んでください</div>
    <div class="options" id="genreOpts"></div>
    <div class="btn-row"><button class="btn btn-next" id="btn1" disabled onclick="goTo(2)">次へ →</button></div>
  </div>

  <!-- STEP 2: フォロワー数 -->
  <div class="screen" id="screen2">
    <div class="screen-title">現在のフォロワー数は？</div>
    <div class="screen-subtitle">全SNS合算の目安でOKです</div>
    <div class="options" id="followerOpts"></div>
    <div class="btn-row"><button class="btn btn-back" onclick="goTo(1)">←</button><button class="btn btn-next" id="btn2" disabled onclick="goTo(3)">次へ →</button></div>
  </div>

  <!-- STEP 3: リスト数 -->
  <div class="screen" id="screen3">
    <div class="screen-title">メルマガ・LINE等のリスト数は？</div>
    <div class="screen-subtitle">見込み客リスト（メール / LINE / 公式アカウント）の合計</div>
    <div class="options" id="listOpts"></div>
    <div class="btn-row"><button class="btn btn-back" onclick="goTo(2)">←</button><button class="btn btn-next" id="btn3" disabled onclick="goTo(4)">次へ →</button></div>
  </div>

  <!-- STEP 4: マネタイズ -->

const S = {genre:null,followers:null,list:null,monetize:[],revenue:0};

/* ===== BUILD UI ===== */
function buildProgress(){
  document.getElementById('progressBar').innerHTML = STEPS.map(s=>'<div class="progress-step" id="prog'+s.id+'"></div>').join('');
  document.getElementById('stepLabels').innerHTML = STEPS.map(s=>'<span class="step-label" id="lbl'+s.id+'">'+s.label+'</span>').join('');
}
function buildOptions(containerId, items, key, btnId){
  var c = document.getElementById(containerId);
  c.innerHTML = items.map(function(it){return '<div class="option" data-value="'+it.v+'" onclick="pickOne(this,\''+key+'\',\''+btnId+'\')"><div class="option-icon">'+it.icon+'</div><div class="option-text"><div class="name">'+it.name+'</div><div class="desc">'+it.desc+'</div></div><div class="option-check"></div></div>';}).join('');
}
function buildMonetize(){
  var c = document.getElementById('monetizeOpts');
  c.innerHTML = MONETIZE.map(function(it){return '<div class="option" data-value="'+it.v+'" onclick="'+(it.v==='none'?'pickNone(this)':'pickMulti(this)')+'"><div class="option-icon">'+it.icon+'</div><div class="option-text"><div class="name">'+it.name+'</div><div class="desc">'+it.desc+'</div></div><div class="option-check"></div></div>';}).join('');
}
function buildRevenueQuick(){
  document.getElementById('revenueQuick').innerHTML = REVENUE_QUICK.map(function(v){return '<button class="quick-btn" onclick="setRev('+v+',this)">'+REVENUE_LABELS[v]+'</button>';}).join('');
}

/* ===== INTERACTIONS ===== */
function pickOne(el,key,btnId){
  el.parentElement.querySelectorAll('.option').forEach(function(o){o.classList.remove('selected')});
  el.classList.add('selected'); S[key]=el.dataset.value;
  document.getElementById(btnId).disabled=false;
}
function pickMulti(el){
  var none=el.parentElement.querySelector('[data-value="none"]');
  if(none)none.classList.remove('selected');
  S.monetize=S.monetize.filter(function(v){return v!=='none'});
  el.classList.toggle('selected');
  if(el.classList.contains('selected'))S.monetize.push(el.dataset.value);
  else S.monetize=S.monetize.filter(function(v){return v!==el.dataset.value});
  document.getElementById('btn4').disabled=S.monetize.length===0;
}
function pickNone(el){
  el.parentElement.querySelectorAll('.option').forEach(function(o){o.classList.remove('selected')});
  el.classList.add('selected'); S.monetize=['none'];
  document.getElementById('btn4').disabled=false;
}
function setRev(val,btn){
  document.getElementById('revenueInput').value=val; S.revenue=val;
  document.querySelectorAll('#revenueQuick .quick-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
}
function goTo(step){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  document.getElementById('screen'+step).classList.add('active');
  STEPS.forEach(function(s){
    var p=document.getElementById('prog'+s.id),l=document.getElementById('lbl'+s.id);
    p.className='progress-step';l.className='step-label';
    if(s.id<step){p.classList.add('done');l.classList.add('done')}
    if(s.id===step){p.classList.add('active');l.classList.add('active')}
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

function fmtY(n){
  if(n>=100000000)return(n/100000000).toFixed(1).replace(/\.0$/,'')+'\u5104';
  if(n>=10000)return(n/10000).toFixed(n>=100000?0:1).replace(/\.0$/,'')+'\u4E07';
  return n.toLocaleString();
}

  var listRate=followers>0?((listSize/followers)*100):0;
